<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頭整理くん</title>
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --ink: #2f3b46;
    --ink-soft: #6b7884;
    --line: #e3e8ed;
    --accent: #5b9aa0;
    --accent-soft: #e7f1f1;
    --keep: #5aa469;
    --keep-soft: #e8f3ea;
    --keep-line: #cfe6d4;
    --trash: #c0796f;
    --trash-soft: #f6ebe9;
    --trash-line: #ecd5d1;
    --shadow: 0 1px 3px rgba(47, 59, 70, 0.08), 0 6px 18px rgba(47, 59, 70, 0.06);
    --radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 18px 80px;
  }

  header.app { text-align: center; margin-bottom: 22px; }
  header.app h1 { font-size: 1.5rem; margin: 0 0 4px; letter-spacing: 0.02em; }
  header.app p { margin: 0; color: var(--ink-soft); font-size: 0.92rem; }

  /* ステップインジケーター */
  .steps { display: flex; gap: 8px; margin: 0 0 24px; }
  .step-pill {
    flex: 1; border: 1px solid var(--line); background: var(--panel);
    color: var(--ink-soft); border-radius: 999px; padding: 9px 6px;
    font-size: 0.86rem; cursor: pointer; transition: all 0.18s ease; font-family: inherit;
  }
  .step-pill .n {
    display: inline-flex; width: 1.4em; height: 1.4em; border-radius: 50%;
    background: var(--line); color: var(--ink-soft); align-items: center;
    justify-content: center; font-size: 0.78rem; margin-right: 5px; transition: all 0.18s ease;
  }
  .step-pill.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .step-pill.active .n { background: var(--accent); color: #fff; }
  .step-pill:hover:not(.active) { border-color: var(--accent); }

  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px;
  }

  .lead { margin: 0 0 16px; color: var(--ink-soft); font-size: 0.92rem; }
  .lead strong { color: var(--ink); }

  /* 入力 */
  .add-row { display: flex; gap: 8px; margin-bottom: 18px; }
  .add-row input {
    flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
    font-size: 1rem; font-family: inherit; color: var(--ink); background: #fbfcfd; transition: border-color 0.15s ease;
  }
  .add-row input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .btn {
    border: none; border-radius: 10px; padding: 11px 16px; font-size: 0.95rem;
    font-family: inherit; cursor: pointer; transition: filter 0.15s ease, background 0.15s ease; white-space: nowrap;
  }
  .btn:active { filter: brightness(0.96); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ===== STEP1: 散らかったボード ===== */
  .board {
    display: flex; flex-wrap: wrap; align-items: flex-start;
    gap: 14px 12px; justify-content: center; padding: 16px 6px 6px; min-height: 120px;
  }
  .note {
    position: relative; width: 165px; min-height: 76px; padding: 14px 14px 16px;
    border-radius: 3px; font-size: 0.95rem; color: #4a4133;
    box-shadow: 0 3px 7px rgba(47,59,70,0.14), 0 1px 2px rgba(47,59,70,0.10);
    transform: rotate(var(--rot, 0deg)); transition: transform 0.16s ease, box-shadow 0.16s ease;
    animation: drop-in 0.22s ease;
  }
  .note:hover { transform: rotate(0deg) scale(1.03); box-shadow: 0 6px 16px rgba(47,59,70,0.18); z-index: 2; }
  @keyframes drop-in { from { opacity: 0; transform: rotate(var(--rot,0deg)) translateY(-8px) scale(0.96); } to { opacity: 1; } }
  .note-t0 { background: #fff7c8; }
  .note-t1 { background: #ffe0e0; }
  .note-t2 { background: #d9f0d6; }
  .note-t3 { background: #d6ecf7; }
  .note-t4 { background: #efe0f7; }
  .note-t5 { background: #ffe6c7; }
  .note .text { word-break: break-word; outline: none; }
  .note .text:focus { box-shadow: inset 0 -2px 0 rgba(74,65,51,0.4); }
  .note .del {
    position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%;
    border: none; background: #fff; color: var(--trash); box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer; font-size: 0.8rem; line-height: 1; opacity: 0; transition: opacity 0.14s ease; padding: 0;
  }
  .note:hover .del, .note:focus-within .del { opacity: 1; }
  .board-hint { text-align: center; color: var(--ink-soft); font-size: 0.82rem; margin-top: 14px; }

  /* ===== STEP2: 左右に仕分け ===== */
  .sort-wrap { display: flex; flex-direction: column; gap: 14px; }
  .bin {
    border: 1.5px dashed var(--line); border-radius: 12px; padding: 12px;
    transition: background 0.15s ease, border-color 0.15s ease; min-height: 84px;
  }
  .bin-head { display: flex; align-items: center; gap: 7px; font-size: 0.92rem; font-weight: 600; margin-bottom: 10px; }
  .bin-head .count { background: rgba(0,0,0,0.06); color: var(--ink-soft); border-radius: 999px; padding: 1px 9px; font-size: 0.78rem; font-weight: 400; }

  .bin-inbox { border-color: var(--line); }
  .bins-lr { display: flex; gap: 12px; }
  .bins-lr .bin { flex: 1; min-width: 0; }
  .bin-keep { border-color: var(--keep-line); background: rgba(232,243,234,0.4); }
  .bin-keep .bin-head { color: var(--keep); }
  .bin-trash { border-color: var(--trash-line); background: rgba(246,235,233,0.4); }
  .bin-trash .bin-head { color: var(--trash); }

  /* ドロップ中のハイライト */
  .bin.drop-active { border-style: solid; }
  .bin-keep.drop-active { background: var(--keep-soft); border-color: var(--keep); box-shadow: 0 0 0 3px rgba(90,164,105,0.18); }
  .bin-trash.drop-active { background: var(--trash-soft); border-color: var(--trash); box-shadow: 0 0 0 3px rgba(192,121,111,0.18); }
  .bin-inbox.drop-active { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 3px rgba(91,154,160,0.16); }

  .cards { display: flex; flex-direction: column; gap: 8px; }

  .card {
    display: flex; align-items: center; gap: 8px; border: 1px solid var(--line);
    border-radius: 10px; padding: 11px 12px; background: #fff; font-size: 0.96rem;
    touch-action: none; cursor: grab; user-select: none; animation: pop 0.16s ease;
  }
  .card:active { cursor: grabbing; }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .card .grip { color: var(--ink-soft); font-size: 0.95rem; flex-shrink: 0; opacity: 0.55; }
  .card .text { flex: 1; word-break: break-word; }
  .card.in-keep { background: var(--keep-soft); border-color: var(--keep-line); }
  .card.in-trash { background: var(--trash-soft); border-color: var(--trash-line); }
  .card.in-trash .text { color: var(--ink-soft); text-decoration: line-through; }

  .card.dragging { opacity: 0.35; }
  .drag-ghost {
    position: fixed; z-index: 1000; pointer-events: none; margin: 0;
    box-shadow: 0 10px 24px rgba(47,59,70,0.25); transform: rotate(-2deg) scale(1.02);
    opacity: 0.97; cursor: grabbing;
  }

  .empty { text-align: center; color: var(--ink-soft); padding: 16px 10px; font-size: 0.86rem; }

  /* STEP3 達成画面 */
  .done-head { text-align: center; padding: 8px 0 4px; }
  .done-head .check { font-size: 2.4rem; line-height: 1; }
  .done-head h2 { margin: 8px 0 4px; font-size: 1.25rem; }
  .done-head p { margin: 0; color: var(--ink-soft); font-size: 0.92rem; }
  #list-result .card { cursor: default; touch-action: auto; }

  .nav { display: flex; justify-content: space-between; margin-top: 22px; gap: 10px; }

  .reset-row { text-align: center; margin-top: 26px; }
  .link-danger { background: none; border: none; color: var(--ink-soft); font-size: 0.84rem; cursor: pointer; text-decoration: underline; font-family: inherit; }
  .link-danger:hover { color: var(--trash); }

  .hidden { display: none !important; }

  /* 保存できなかったときの穏やかなお知らせ（画面下に控えめに出す） */
  .notice {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(12px);
    max-width: 480px; width: calc(100% - 32px); z-index: 1100;
    background: var(--panel); color: var(--ink); border: 1px solid var(--trash-line);
    border-radius: 12px; box-shadow: var(--shadow); padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.88rem; line-height: 1.55;
    opacity: 0; pointer-events: none; transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .notice.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .notice .ic { flex-shrink: 0; }
  .notice .body { flex: 1; }
  .notice .close {
    flex-shrink: 0; border: none; background: none; color: var(--ink-soft);
    cursor: pointer; font-size: 1rem; line-height: 1; padding: 2px 4px; font-family: inherit;
  }
  .notice .close:hover { color: var(--ink); }

  footer.app { text-align: center; margin-top: 28px; color: var(--ink-soft); font-size: 0.78rem; }

  @media (max-width: 560px) {
    .step-pill { font-size: 0.78rem; padding: 8px 4px; }
    .step-pill .n { margin-right: 3px; }
    .panel { padding: 16px; }
    .bins-lr { flex-direction: column; }
    .note { width: 140px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>頭整理くん</h1>
    <p>頭の中を全部だして、いるものだけ残そう</p>
  </header>

  <nav class="steps" aria-label="ステップ">
    <button class="step-pill" data-step="1"><span class="n">1</span>全部だす</button>
    <button class="step-pill" data-step="2"><span class="n">2</span>仕分ける</button>
    <button class="step-pill" data-step="3"><span class="n">3</span>残す</button>
  </nav>

  <!-- STEP 1: 全部だす -->
  <section class="panel" id="view-1">
    <p class="lead"><strong>頭の中にあること、全部だしてみよう。</strong><br>
      タスク・気がかり・もやもや、なんでもOK。良し悪しは気にせず、思いつくままに書いて Enter。</p>
    <div class="add-row">
      <input id="card-input" type="text" placeholder="例：あの返信しなきゃ／なんか落ち着かない…" autocomplete="off">
      <button class="btn btn-primary" id="add-btn">追加</button>
    </div>
    <div class="board" id="board"></div>
    <p class="board-hint" id="board-hint"></p>
    <div class="nav">
      <span></span>
      <button class="btn btn-primary" id="to-step2">仕分けへ進む →</button>
    </div>
  </section>

  <!-- STEP 2: 仕分ける -->
  <section class="panel hidden" id="view-2">
    <p class="lead"><strong>カードをドラッグして、左右に分けよう。</strong><br>
      「いる」なら左へ、「いらない」なら右のゴミ箱へ。迷うものは上に残したままでも大丈夫。</p>
    <div class="add-row">
      <input id="card-input-2" type="text" placeholder="まだ出てきたら、ここで追加できます" autocomplete="off">
      <button class="btn btn-ghost" id="add-btn-2">追加</button>
    </div>

    <div class="sort-wrap">
      <div class="bin bin-inbox" data-status="inbox">
        <div class="bin-head">📥 仕分けるもの <span class="count" id="count-inbox">0</span></div>
        <div class="cards" id="list-inbox"></div>
      </div>
      <div class="bins-lr">
        <div class="bin bin-keep" data-status="keep">
          <div class="bin-head">✓ いる（残す） <span class="count" id="count-keep">0</span></div>
          <div class="cards" id="list-keep"></div>
        </div>
        <div class="bin bin-trash" data-status="trash">
          <div class="bin-head">🗑 いらない <span class="count" id="count-trash">0</span></div>
          <div class="cards" id="list-trash"></div>
        </div>
      </div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" id="back-step1">← 戻る</button>
      <button class="btn btn-primary" id="to-step3">整理できた →</button>
    </div>
  </section>

  <!-- STEP 3: 残す -->
  <section class="panel hidden" id="view-3">
    <div class="done-head">
      <div class="check">🌱</div>
      <h2>これが、いまのあなたの頭の中。</h2>
      <p id="done-sub">本当に必要なことだけが残りました。</p>
    </div>
    <div class="cards" id="list-result" style="margin-top:18px;"></div>
    <div class="nav">
      <button class="btn btn-ghost" id="back-step2">← 仕分けに戻る</button>
      <span></span>
    </div>
    <div class="reset-row">
      <button class="link-danger" id="reset-btn">すべて消して、最初からやり直す</button>
    </div>
  </section>

  <footer class="app">
    データはこの端末のブラウザ内だけに保存されます。外部には送信されません。
  </footer>
</div>

<!-- 保存できなかったときの穏やかなお知らせ -->
<div class="notice" id="notice" role="status" aria-live="polite">
  <span class="ic" aria-hidden="true">💾</span>
  <span class="body" id="notice-body"></span>
  <button class="close" id="notice-close" type="button" aria-label="閉じる">✕</button>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "atama-seiri-kun:cards";
  var STATUS = { INBOX: "inbox", KEEP: "keep", TRASH: "trash" };
  var TONES = 6;

  var cards = load();
  var currentStep = 1; // いま表示中のステップ（描画対象の切り分けに使う）

  // ---- 永続化 ----
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      var data = JSON.parse(raw);
      if (!Array.isArray(data)) return [];
      return data.filter(function (c) { return c && typeof c.text === "string"; });
    } catch (e) { return []; }
  }
  // 保存。クォータ超過などで保存できない場合は、データを勝手に消さず、
  // 保存できなかったことだけを穏やかにユーザーへ知らせる（設計思想: プレッシャーを与えない）。
  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
      return true;
    } catch (e) {
      if (isQuotaError(e)) {
        showNotice("この端末の保存容量がいっぱいで、今の内容を保存できませんでした。" +
          "画面を開いている間は使えますが、閉じると今回の変更は残らないかもしれません。" +
          "いらないカードを少し減らすと、また保存できるようになります。");
      }
      // それ以外（localStorage が使えない環境など）は従来どおり保存なしで動作継続する。
      return false;
    }
  }
  // クォータ超過エラーの判定（ブラウザごとに name / code が異なるため両方を見る）。
  function isQuotaError(e) {
    return !!e && (
      e.name === "QuotaExceededError" ||
      e.name === "NS_ERROR_DOM_QUOTA_REACHED" ||
      e.code === 22 || e.code === 1014
    );
  }
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // 散らかし見た目用の安定値（idから決定的に算出する）。
  // 乱数ではなく id から導くことで、再描画やリロードでも付箋の色・傾きが変わらない。

  // 文字列を 0 以上の整数へ畳み込む簡易ハッシュ（djb2 系の 31 倍積算）。
  // `| 0` で都度 32bit 整数に丸めてオーバーフローを抑え、最後に絶対値を取る。
  // 暗号用途ではなく、見た目のばらつきを安定的に決めるためだけのもの。
  function hashStr(s) {
    var h = 0; for (var i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return Math.abs(h);
  }
  // 付箋の配色（note-t0..t5）。古いカードには tone が無いので id ハッシュから決める。
  function toneOf(card) {
    if (typeof card.tone === "number") return card.tone;
    return hashStr(card.id) % TONES;
  }
  // 付箋の傾き。id に "r" を足して色とは別系列のハッシュにし、-5..+5 度へ写す。
  function rotOf(card) {
    return ((hashStr(card.id + "r") % 11) - 5); // 0..10 → -5..+5 度
  }

  // ---- 操作 ----
  function addCard(text) {
    var t = (text || "").trim();
    if (!t) return false;
    cards.push({ id: uid(), text: t, status: STATUS.INBOX, createdAt: Date.now(), tone: Math.floor(Math.random() * TONES) });
    save();
    return true;
  }
  function setStatus(id, status) {
    for (var i = 0; i < cards.length; i++) { if (cards[i].id === id) { cards[i].status = status; break; } }
    save(); render();
  }
  function updateText(id, text) {
    for (var i = 0; i < cards.length; i++) { if (cards[i].id === id) { cards[i].text = text; break; } }
    save();
  }
  function removeCard(id) {
    cards = cards.filter(function (c) { return c.id !== id; });
    save(); render();
  }
  function byStatus(s) { return cards.filter(function (c) { return c.status === s; }); }

  // ---- 描画ヘルパ ----
  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  // STEP1: 付箋
  function noteEl(card) {
    var n = el("div", "note note-t" + toneOf(card));
    n.style.setProperty("--rot", rotOf(card) + "deg");
    n.dataset.id = card.id;

    var text = el("div", "text", card.text);
    text.setAttribute("contenteditable", "true");
    text.setAttribute("spellcheck", "false");
    text.addEventListener("blur", function () {
      var v = text.textContent.trim();
      if (v) updateText(card.id, v); else removeCard(card.id);
    });
    text.addEventListener("keydown", function (ev) {
      if (ev.key === "Enter") { ev.preventDefault(); text.blur(); }
    });
    n.appendChild(text);

    var del = el("button", "del", "✕");
    del.type = "button";
    del.title = "消す";
    del.addEventListener("click", function () { removeCard(card.id); });
    n.appendChild(del);
    return n;
  }

  // STEP2/3: 横長カード（ドラッグ可）
  function cardEl(card, opts) {
    opts = opts || {};
    var c = el("div", "card");
    if (card.status === STATUS.KEEP) c.classList.add("in-keep");
    if (card.status === STATUS.TRASH) c.classList.add("in-trash");
    c.dataset.id = card.id;

    if (opts.draggable) {
      c.appendChild(el("span", "grip", "⠿"));
      attachDrag(c, card);
    }
    c.appendChild(el("span", "text", card.text));
    return c;
  }

  function renderList(container, list, builder, emptyMsg) {
    container.innerHTML = "";
    if (list.length === 0) {
      if (emptyMsg != null) container.appendChild(el("div", "empty", emptyMsg));
      return;
    }
    list.forEach(function (card) { container.appendChild(builder(card)); });
  }

  // STEP1: 散らかったボード（ゴミ箱以外を出した順に）
  function renderBoard() {
    var boardList = cards.filter(function (c) { return c.status !== STATUS.TRASH; });
    renderList(document.getElementById("board"), boardList, noteEl, null);
    var hint = document.getElementById("board-hint");
    if (boardList.length === 0) {
      hint.textContent = "まだ空っぽ。頭の中にあること、書いてみよう。";
    } else {
      hint.textContent = "ぜんぶで " + boardList.length + " 個。出し切ったら「仕分けへ進む」。";
    }
  }

  // STEP2: 左右ドラッグの仕分けビュー
  function renderSort() {
    var inbox = byStatus(STATUS.INBOX);
    var keep = byStatus(STATUS.KEEP);
    var trash = byStatus(STATUS.TRASH);

    renderList(document.getElementById("list-inbox"), inbox, function (c) { return cardEl(c, { draggable: true }); }, "（ここは空です）");
    renderList(document.getElementById("list-keep"), keep, function (c) { return cardEl(c, { draggable: true }); }, "ドラッグでここへ");
    renderList(document.getElementById("list-trash"), trash, function (c) { return cardEl(c, { draggable: true }); }, "ドラッグでここへ");

    document.getElementById("count-inbox").textContent = inbox.length;
    document.getElementById("count-keep").textContent = keep.length;
    document.getElementById("count-trash").textContent = trash.length;
  }

  // STEP3: 残った「いる」カードの達成画面
  function renderResult() {
    var keep = byStatus(STATUS.KEEP);
    renderList(document.getElementById("list-result"), keep, function (c) { return cardEl(c, { draggable: false }); },
      "残ったものはありません。いまは、頭の中がからっぽです。");
    var sub = document.getElementById("done-sub");
    sub.textContent = keep.length === 0
      ? "いまは何も残っていません。それも、ひとつの答えです。"
      : "本当に必要なことだけが残りました。ひとつずつで大丈夫。";
  }

  // 表示中のステップだけを描画する（非表示ビューはステップ切り替え時に描画される）。
  function render() {
    if (currentStep === 1) renderBoard();
    else if (currentStep === 2) renderSort();
    else if (currentStep === 3) renderResult();
  }

  // ---- ドラッグ＆ドロップ（Pointer Events / マウス・タッチ両対応）----
  var drag = null;

  function attachDrag(cardEl, card) {
    cardEl.addEventListener("pointerdown", function (e) {
      if (e.button != null && e.button !== 0) return; // 左クリック/タッチのみ
      startDrag(e, cardEl, card);
    });
  }

  function startDrag(e, srcEl, card) {
    var startX = e.clientX, startY = e.clientY;
    var rect = srcEl.getBoundingClientRect();
    var offX = startX - rect.left, offY = startY - rect.top;
    var width = rect.width;
    var started = false, ghost = null, lastZone = null, done = false;

    function onMove(ev) {
      var dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!started) {
        if (Math.abs(dx) + Math.abs(dy) < 6) return; // 閾値（タップと区別）
        started = true;
        srcEl.classList.add("dragging");
        ghost = srcEl.cloneNode(true);
        ghost.classList.add("drag-ghost");
        ghost.classList.remove("dragging");
        ghost.style.width = width + "px";
        document.body.appendChild(ghost);
      }
      ghost.style.left = (ev.clientX - offX) + "px";
      ghost.style.top = (ev.clientY - offY) + "px";

      var zone = zoneUnder(ev.clientX, ev.clientY);
      if (zone !== lastZone) {
        if (lastZone) lastZone.classList.remove("drop-active");
        if (zone) zone.classList.add("drop-active");
        lastZone = zone;
      }
      ev.preventDefault();
    }

    function finish(ev) {
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onUp);
      if (lastZone) lastZone.classList.remove("drop-active");
      srcEl.classList.remove("dragging");
      if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
      return ev;
    }
    function onUp(ev) {
      if (done) return; // pointerup と pointercancel の二重処理を防ぐ
      done = true;
      var dropped = started ? zoneUnder(ev.clientX, ev.clientY) : null;
      finish(ev);
      if (dropped) {
        var target = dropped.getAttribute("data-status");
        if (target && target !== card.status) { setStatus(card.id, target); return; }
      }
      if (started) render(); // 同じ場所に戻す
    }

    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onUp);
  }

  function zoneUnder(x, y) {
    var elem = document.elementFromPoint(x, y);
    return elem ? elem.closest(".bin") : null;
  }

  // ---- ステップ切り替え ----
  function goStep(n) {
    currentStep = n;
    [1, 2, 3].forEach(function (i) {
      document.getElementById("view-" + i).classList.toggle("hidden", i !== n);
    });
    document.querySelectorAll(".step-pill").forEach(function (p) {
      p.classList.toggle("active", parseInt(p.getAttribute("data-step"), 10) === n);
    });
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
    if (n === 1) setTimeout(function () { document.getElementById("card-input").focus(); }, 50);
  }

  // ---- お知らせ表示 ----
  var noticeTimer = null;
  function showNotice(msg) {
    var n = document.getElementById("notice");
    if (!n) return;
    document.getElementById("notice-body").textContent = msg;
    n.classList.add("show");
    if (noticeTimer) clearTimeout(noticeTimer);
    noticeTimer = setTimeout(hideNotice, 8000); // しばらくしたら自動で引っ込める
  }
  function hideNotice() {
    var n = document.getElementById("notice");
    if (n) n.classList.remove("show");
    if (noticeTimer) { clearTimeout(noticeTimer); noticeTimer = null; }
  }
  document.getElementById("notice-close").addEventListener("click", hideNotice);

  // ---- 入力配線 ----
  function wireAdd(inputId, btnId) {
    var input = document.getElementById(inputId);
    var btn = document.getElementById(btnId);
    function commit() {
      if (addCard(input.value)) { input.value = ""; render(); }
      input.focus();
    }
    btn.addEventListener("click", commit);
    input.addEventListener("keydown", function (ev) {
      if (ev.key === "Enter") { ev.preventDefault(); commit(); }
    });
  }
  wireAdd("card-input", "add-btn");
  wireAdd("card-input-2", "add-btn-2");

  document.querySelectorAll(".step-pill").forEach(function (p) {
    p.addEventListener("click", function () { goStep(parseInt(p.getAttribute("data-step"), 10)); });
  });
  document.getElementById("to-step2").addEventListener("click", function () { goStep(2); });
  document.getElementById("back-step1").addEventListener("click", function () { goStep(1); });
  document.getElementById("to-step3").addEventListener("click", function () { goStep(3); });
  document.getElementById("back-step2").addEventListener("click", function () { goStep(2); });

  document.getElementById("reset-btn").addEventListener("click", function () {
    if (confirm("すべてのカードを消して、最初からやり直しますか？\nこの操作は取り消せません。")) {
      cards = []; save(); goStep(1);
    }
  });

  goStep(1);
})();
</script>
</body>
</html>
